# Toolbox 生产部署
#
# 首次启动前：
#   1. 复制 .env.example → .env，填写 TOOLBOX_ADMIN_TOKEN 等变量
#   2. 将 nginx.conf 中的 yourdomain.com 替换为你的真实域名
#   3. 申请 Let's Encrypt 证书（仅首次）：
#      docker compose run --rm certbot certonly --webroot \
#        -w /var/www/certbot -d yourdomain.com --email your@email.com --agree-tos
#   4. docker compose up -d --build
#
# 证书续期：certbot 服务每 12 小时自动检查并续期

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: toolbox-api:latest
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      TOOLBOX_DATA_DIR: /data
      TOOLBOX_ADMIN_TOKEN: ${TOOLBOX_ADMIN_TOKEN}
      TOOLBOX_RATE_LIMIT: ${TOOLBOX_RATE_LIMIT:-20/minute}
      TOOLBOX_MAX_UPLOAD_MB: ${TOOLBOX_MAX_UPLOAD_MB:-100}
      HF_HOME: /data/huggingface
      DOCLING_CACHE: /data/docling
    volumes:
      - toolbox_data:/data
    command: toolbox serve --host 0.0.0.0
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: toolbox-web:latest
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - api
      - web

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"

volumes:
  toolbox_data:
  certbot_certs:
  certbot_webroot:
