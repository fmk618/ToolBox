# Toolbox 一键自托管：前端 + 后端
#
# 用途：
#   - 本地或单机服务器一行命令拉起完整工具百宝箱
#   - 商用部署时把 ports 改成内部网络，前面套 Nginx / Caddy 做 TLS 与域名
#
# 启动：
#   docker compose up -d --build
#
# 默认监听：
#   - http://localhost:3000  →  Web 前端
#   - http://localhost:8000  →  Backend API
#
# 商用部署看 docs/DEPLOYMENT.md。

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: toolbox-api:latest
    restart: unless-stopped
    environment:
      # 允许哪些 Origin 调用 API。商用部署改成你的域名，多个用逗号分隔
      TOOLBOX_ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
      # 让 Docling / HF 模型缓存持久化到挂载卷
      HF_HOME: /data/huggingface
      DOCLING_CACHE: /data/docling
    volumes:
      - toolbox_data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_API_BASE 是构建期注入，运行时改要重新 build。
        # 商用部署改成你的 API 域名。
        NEXT_PUBLIC_API_BASE: "http://localhost:8000"
    image: toolbox-web:latest
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"

  # ---- 可选：opendataloader-pdf hybrid 模式 sidecar ----
  # 取消注释后即可在前端「系统设置」配置 hybrid backend URL：
  #   http://opendataloader:5002
  # 启用后 PDF→Markdown 走 benchmark 第一档的混合管线
  # opendataloader:
  #   image: ghcr.io/opendataloader-project/opendataloader-pdf-hybrid:latest
  #   restart: unless-stopped
  #   environment:
  #     OPENDATALOADER_PORT: "5002"
  #   expose:
  #     - "5002"

volumes:
  toolbox_data:
